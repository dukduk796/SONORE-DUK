function seleccionarCancion(id) {
    const cancion = repertorio[id];
    if(!cancion) return;

    document.getElementById('titulo-cancion').innerText = cancion.titulo;
    
    // Llenado de hojas por separado
    document.getElementById('hoja1-contenido').innerHTML = `<pre>${cancion.hoja1 || ''}</pre>`;
    document.getElementById('hoja2-contenido').innerHTML = `<pre>${cancion.hoja2 || ''}</pre>`;
}
